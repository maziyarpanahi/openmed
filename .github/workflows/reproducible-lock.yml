name: Reproducible Lock Gate

# Runs whenever the dependency surface changes, and on demand.
# Intentionally separate from ci.yml so the gate is independently auditable
# and can be required as a branch-protection check on its own.
on:
  push:
    branches: [main, master, develop]
    paths:
      - 'uv.lock'
      - 'pyproject.toml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'uv.lock'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:

  # ── Job 1 ────────────────────────────────────────────────────────────────────
  # Parse uv.lock and assert that every resolved package carries:
  #   - an exact pinned version
  #   - at least one sha256 integrity hash
  # Packages from git/path/directory sources are rejected because they cannot
  # be content-addressed.  Virtual entries (the root project placeholder) are
  # skipped.
  # On success, emits a single reproducibility digest that fingerprints the
  # entire dependency set and uploads it as a CI artifact.
  # ─────────────────────────────────────────────────────────────────────────────
  lock-integrity:
    name: Assert lock is fully pinned and hashed
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.digest.outputs.digest }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv (cache disabled — we want a clean resolver state)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      # Reuse the same check that lockfile-drift in ci.yml performs, but now
      # as a hard prerequisite before we inspect the file contents.
      - name: Assert uv.lock is consistent with pyproject.toml
        run: |
          if ! uv lock --check; then
            echo "::error title=uv.lock is out of date::Run 'uv lock' locally and commit the result."
            exit 1
          fi

      # Core integrity check.  Parses uv.lock (TOML), walks every [[package]]
      # entry, and enforces:
      #   1. Version is present and pinned (no floating specifiers).
      #   2. Source is a registry (PyPI-compatible), not git/path/directory.
      #   3. At least one sha256 hash exists in the sdist or wheels entries.
      # Then builds a sorted, deterministic string of "name==version:hashes"
      # lines and SHA-256s the whole thing to produce the reproducibility digest.
      - name: Assert all packages are pinned with integrity hashes
        id: digest
        run: |
          python3 - <<'PYEOF'
          import hashlib, os, sys, tomllib

          with open("uv.lock", "rb") as fh:
              lock = tomllib.loads(fh.read().decode())

          packages = lock.get("package", [])

          # uv inserts a "virtual" source entry for the root project itself.
          # It has no wheel/sdist and is not a third-party dep — skip it.
          SKIP_SOURCE_TYPES = {"virtual"}

          # These source types cannot carry content-addressable hashes.
          # A git ref can change behind the same SHA; a local path is not
          # reproducible across machines.
          UNPINNABLE_SOURCE_TYPES = {"git", "path", "directory", "editable"}

          errors = []
          digest_parts = []

          for pkg in packages:
              name    = pkg.get("name", "<unknown>")
              version = pkg.get("version")
              source  = pkg.get("source", {})
              # The first key in the source table tells us the source type.
              source_type = next(iter(source), None)

              if source_type in SKIP_SOURCE_TYPES:
                  continue

              if not version:
                  errors.append(f"  MISSING VERSION      : {name}")
                  continue

              if source_type in UNPINNABLE_SOURCE_TYPES:
                  errors.append(
                      f"  UNPINNABLE SOURCE    : {name}=={version} "
                      f"(source type '{source_type}' cannot carry integrity hashes — "
                      f"use a PyPI release instead)"
                  )
                  continue

              # Collect every sha256 hash recorded for this package.
              hashes = []
              sdist = pkg.get("sdist")
              if sdist and sdist.get("hash"):
                  hashes.append(sdist["hash"])
              for wheel in pkg.get("wheels", []):
                  if wheel.get("hash"):
                      hashes.append(wheel["hash"])

              if not hashes:
                  errors.append(f"  MISSING HASHES       : {name}=={version}")
                  continue

              # Stable entry: sort the hashes so wheel-ordering differences
              # across platforms do not affect the digest.
              digest_parts.append(
                  f"{name}=={version}:" + ",".join(sorted(hashes))
              )

          if errors:
              print("::error title=Lock integrity check failed::")
              print("The following packages have missing pins or hashes:")
              for e in errors:
                  print(e)
              sys.exit(1)

          # Sort the entries so the digest is independent of the order uv
          # writes packages into the lock file.
          digest_parts.sort()
          raw    = "\n".join(digest_parts).encode()
          digest = "sha256:" + hashlib.sha256(raw).hexdigest()

          lock_hash = hashlib.sha256(open("uv.lock", "rb").read()).hexdigest()

          print(f"Lock integrity      : OK ({len(packages)} packages checked)")
          print(f"Reproducibility digest: {digest}")

          with open("reproducibility-digest.txt", "w") as out:
              out.write(f"digest: {digest}\n")
              out.write(f"packages: {len(packages)}\n")
              out.write(f"uv-lock-sha256: sha256:{lock_hash}\n")

          # Expose the digest as a job output so lock-gate can echo it.
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"digest={digest}\n")
          PYEOF

      - name: Upload reproducibility digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: reproducibility-digest
          path: reproducibility-digest.txt

  # ── Job 2 ────────────────────────────────────────────────────────────────────
  # Prove that running `uv sync --frozen` twice in completely independent, cache-
  # free virtual environments produces byte-for-byte the same installed package
  # set.  This catches any residual non-determinism in the resolution or
  # download layer that the lock file alone would not expose.
  # ─────────────────────────────────────────────────────────────────────────────
  reproducibility:
    name: Prove two clean installs are identical
    needs: lock-integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv (cache disabled — each install must be fully independent)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      # First clean install.
      # --frozen       : refuse to update the lock file; fail if it would need to change.
      # --no-cache     : do not read from or write to uv's download cache.
      # --no-install-project : install only dependencies, not the openmed package
      #                        itself, so the list contains only third-party packages.
      - name: Install #1 — first clean environment
        run: |
          uv sync --frozen --no-cache --no-install-project --python 3.11
          uv pip freeze | sort > resolve-1.txt
          echo "── Resolve 1 ──────────────────────────────────"
          cat resolve-1.txt
          echo "Digest: $(sha256sum resolve-1.txt | awk '{print $1}')"

      # Tear down the venv entirely before the second install so there is
      # zero state carried over from the first run.
      - name: Install #2 — second independent clean environment
        run: |
          rm -rf .venv
          uv sync --frozen --no-cache --no-install-project --python 3.11
          uv pip freeze | sort > resolve-2.txt
          echo "── Resolve 2 ──────────────────────────────────"
          cat resolve-2.txt
          echo "Digest: $(sha256sum resolve-2.txt | awk '{print $1}')"

      # The gate: both installs must be identical.  If they differ, print a
      # unified diff so the cause is immediately visible in the log.
      - name: Assert both installs are byte-for-byte identical
        run: |
          d1=$(sha256sum resolve-1.txt | awk '{print $1}')
          d2=$(sha256sum resolve-2.txt | awk '{print $1}')
          if [ "$d1" != "$d2" ]; then
            echo "::error title=Non-reproducible install::The two resolves produced different package sets."
            echo "Install 1 digest : sha256:$d1"
            echo "Install 2 digest : sha256:$d2"
            echo ""
            echo "Diff (lines only in resolve-1 prefixed with <, resolve-2 with >):"
            diff resolve-1.txt resolve-2.txt || true
            exit 1
          fi
          echo "Reproducibility confirmed."
          echo "Install digest : sha256:$d1"

      # Upload both snapshots on success and failure so diffs are auditable
      # even when the gate fails.
      - name: Upload resolve snapshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: resolve-snapshots
          path: |
            resolve-1.txt
            resolve-2.txt

  # ── Job 3 ────────────────────────────────────────────────────────────────────
  # The named gate that branch-protection rules and downstream workflows reference
  # via 'needs: lock-gate'.  It only reaches this point if both jobs above passed,
  # so any other job that declares `needs: lock-gate` is guaranteed a fully
  # pinned, hash-verified, reproducible dependency set.
  # ─────────────────────────────────────────────────────────────────────────────
  lock-gate:
    name: Lock gate (all checks passed)
    needs: [lock-integrity, reproducibility]
    runs-on: ubuntu-latest

    steps:
      - name: Summarise gate result
        run: |
          echo "Lock gate passed."
          echo "Reproducibility digest: ${{ needs.lock-integrity.outputs.digest }}"
          echo ""
          echo "This confirms:"
          echo "  - Every transitive dependency is pinned to an exact version."
          echo "  - Every package carries at least one sha256 integrity hash."
          echo "  - Two independent clean installs produced identical package sets."