name: Release Gates

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      candidate:
        description: Path to the candidate benchmark report JSON.
        required: false
        default: artifacts/release-candidate.json
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  release-gates:
    runs-on: ubuntu-latest
    env:
      CANDIDATE_REPORT: ${{ github.event.inputs.candidate || 'artifacts/release-candidate.json' }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check API migration guide completeness
        if: startsWith(github.ref, 'refs/tags/v1.9.')
        run: |
          python scripts/release/api_surface_diff.py \
            v1.8.0 "$GITHUB_SHA" \
            --json "$RUNNER_TEMP/api-surface-diff.json" \
            --check docs/migration/1.8-to-1.9.md
          echo "API migration guide completeness gate passed." >> "$GITHUB_STEP_SUMMARY"

      - name: Check for candidate report
        id: check-candidate
        run: |
          if [ -f "$CANDIDATE_REPORT" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No candidate report found at $CANDIDATE_REPORT — skipping release gates."
          fi

      - name: Run release gates
        if: steps.check-candidate.outputs.exists == 'true'
        id: gates
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m openmed.eval.release_gates \
            --candidate "$CANDIDATE_REPORT" \
            --output release-gate-report.json \
            --issue-on-failure \
            --repo "$GITHUB_REPOSITORY"

      - name: Upload gate report
        if: always() && steps.check-candidate.outputs.exists == 'true' && hashFiles('release-gate-report.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-report
          path: release-gate-report.json

      - name: Publish candidate
        if: steps.check-candidate.outputs.exists == 'true' && steps.gates.outcome == 'success'
        run: |
          echo "Release gates passed; publish step is unblocked."

      - name: Fail closed
        if: steps.check-candidate.outputs.exists == 'true' && steps.gates.outcome != 'success'
        run: |
          exit 1
