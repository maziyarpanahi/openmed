name: Swift Package (OpenMedKit)

on:
  push:
    branches: [main, master]
    paths:
      - '.swift-format'
      - 'Package.swift'
      - 'scripts/format_swift.sh'
      - 'scripts/lint_swift.sh'
      - 'swift/**'
      - 'tests/fixtures/parity/offset_contract.json'
  pull_request:
    branches: [main, master]
    paths:
      - '.swift-format'
      - 'Package.swift'
      - 'scripts/format_swift.sh'
      - 'scripts/lint_swift.sh'
      - 'swift/**'
      - 'tests/fixtures/parity/offset_contract.json'

jobs:
  build-and-test:
    name: Build & Test OpenMedKit
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v7

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Lint Swift formatting
      run: scripts/lint_swift.sh

    - name: Resolve documented root package dependencies
      run: swift package resolve

    - name: Build documented root package
      run: swift build

    - name: Test documented root package
      run: swift test

    - name: Test Unicode scalar offset parity fixture
      run: swift test --filter OffsetContractParityTests

  build-ios:
    name: Build for iOS
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v7

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build for iOS simulator
      working-directory: swift/OpenMedKit
      run: |
        xcodebuild build \
          -scheme OpenMedKit \
          -destination 'generic/platform=iOS Simulator' \
          -skipPackagePluginValidation

  build-watchos:
    name: Build & Test watchOS Simulator
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v7

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Select available watchOS simulator
      id: destination
      shell: bash
      run: |
        set -euo pipefail
        udid="$(
          xcrun simctl list devices available --json |
            jq -r '[
              .devices | to_entries[] |
              select(.key | contains("watchOS")) |
              .value[] |
              select(.isAvailable == true) |
              .udid
            ][0] // empty'
        )"
        test -n "$udid"
        echo "udid=$udid" >> "$GITHUB_OUTPUT"

    - name: Build and run watchOS parity tests
      working-directory: swift/OpenMedKit
      run: |
        xcodebuild test \
          -scheme OpenMedKit \
          -destination 'platform=watchOS Simulator,id=${{ steps.destination.outputs.udid }}' \
          -only-testing:OpenMedKitTests/WatchVisionParityTests \
          -skipPackagePluginValidation

  build-visionos:
    name: Build & Test visionOS Simulator
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v7

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build native visionOS simulator target
      working-directory: swift/OpenMedKit
      shell: bash
      run: |
        set -euo pipefail
        sdk_path="$(xcrun --sdk xrsimulator --show-sdk-path)"
        swift build \
          --triple arm64-apple-xros1.0-simulator \
          --sdk "$sdk_path"

    - name: Select available visionOS simulator
      id: destination
      shell: bash
      run: |
        set -euo pipefail
        udid="$(
          xcrun simctl list devices available --json |
            jq -r '[
              .devices | to_entries[] |
              select(.key | contains("xrOS")) |
              .value[] |
              select(.isAvailable == true) |
              .udid
            ][0] // empty'
        )"
        test -n "$udid"
        echo "udid=$udid" >> "$GITHUB_OUTPUT"

    - name: Build and run visionOS parity tests
      working-directory: swift/OpenMedKit
      run: |
        xcodebuild test \
          -scheme OpenMedKit \
          -destination 'platform=visionOS Simulator,id=${{ steps.destination.outputs.udid }}' \
          -only-testing:OpenMedKitTests/WatchVisionParityTests \
          -skipPackagePluginValidation
