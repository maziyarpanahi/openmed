name: Swift Package (OpenMedKit)

on:
  push:
    branches: [main, master]
    paths:
      - '.swift-format'
      - 'Package.swift'
      - 'scripts/format_swift.sh'
      - 'scripts/lint_swift.sh'
      - 'swift/**'
  pull_request:
    branches: [main, master]
    paths:
      - '.swift-format'
      - 'Package.swift'
      - 'scripts/format_swift.sh'
      - 'scripts/lint_swift.sh'
      - 'swift/**'

jobs:
  build-and-test:
    name: Build & Test OpenMedKit
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v7

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Lint Swift formatting
      run: scripts/lint_swift.sh

    - name: Resolve Swift package dependencies
      working-directory: swift/OpenMedKit
      run: swift package resolve

    - name: Build OpenMedKit
      working-directory: swift/OpenMedKit
      run: swift build

    - name: Run OpenMedKit tests
      working-directory: swift/OpenMedKit
      run: swift test

  build-ios:
    name: Build for iOS
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v7

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build for iOS simulator
      working-directory: swift/OpenMedKit
      run: |
        xcodebuild build \
          -scheme OpenMedKit \
          -destination 'generic/platform=iOS Simulator' \
          -skipPackagePluginValidation
