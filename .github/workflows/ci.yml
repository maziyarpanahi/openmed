name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  repo-policy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Enforce repo file policy
      run: |
        python scripts/release/check_repo_policy.py

    - name: Enforce dependency license policy
      run: |
        python scripts/release/check_license_policy.py

    - name: Validate GitHub Actions references
      run: |
        python scripts/release/check_github_actions_refs.py

  lockfile-drift:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Check uv.lock matches pyproject.toml
      run: |
        if ! uv lock --check; then
          echo "::error title=uv.lock is out of date::Run 'uv lock' and commit the updated uv.lock."
          exit 1
        fi

  lint:
    needs: repo-policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install lint dependencies
      run: |
        uv sync --frozen --extra dev --python 3.11

    - name: Lint with Ruff
      run: |
        uv run ruff check --output-format=github .

    - name: Check Ruff formatting
      run: |
        uv run ruff format --check .

  test:
    needs: [repo-policy, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # Exclude some combinations to reduce CI time
          - os: windows-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.10"

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install dependencies
      run: |
        uv sync --frozen --extra dev --python ${{ matrix.python-version }}

    - name: Validate model manifest schema
      run: |
        uv run python -m scripts.manifest.validate_manifest

    - name: Test with pytest
      run: |
        uv run pytest --cov=openmed --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    needs: repo-policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install dependencies
      run: |
        uv sync --frozen --extra dev --python 3.11

    - name: Run Bandit report
      run: |
        uv run --with 'bandit[toml]' bandit -r openmed -f json -o bandit-report.json --exit-zero

    - name: Enforce high-severity Bandit findings
      run: |
        uv run --with 'bandit[toml]' bandit -r openmed --severity-level high --confidence-level medium

    - name: Run pip-audit dependency gate
      run: |
        uv run \
          --with pip-audit \
          --with 'requests>=2.33.0' \
          --with 'urllib3>=2.7.0' \
          python scripts/security/pip_audit_gate.py

    - name: Upload security reports
      uses: actions/upload-artifact@v7
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json
      if: always()

  spacy-integration:
    needs: [repo-policy, lint]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Cache pip packages
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-spacy-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-spacy-
          ${{ runner.os }}-pip-

    - name: Install spaCy test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,spacy]"

    - name: Run spaCy adapter tests
      run: |
        pytest tests/unit/interop/test_spacy_component.py -q

  secret-scan:
    needs: repo-policy
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install gitleaks
      run: |
        archive="/tmp/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        curl -sSfL \
          "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
          -o "$archive"
        echo "${GITLEAKS_LINUX_X64_SHA256}  $archive" | sha256sum -c -
        tar -xzf "$archive" -C /tmp gitleaks
        sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
        gitleaks version

    - name: Verify secret scanner canary
      run: |
        canary_dir="$(mktemp -d)"
        cp tests/fixtures/secret_scan_canary.txt "$canary_dir/canary.txt"
        set +e
        gitleaks dir \
          --config .gitleaks.toml \
          --redact \
          --no-banner \
          --report-format json \
          --report-path "$RUNNER_TEMP/gitleaks-canary.json" \
          "$canary_dir"
        canary_status=$?
        set -e
        if [ "$canary_status" -eq 0 ]; then
          echo "::error title=Secret scanner canary was not detected::Expected the synthetic canary to fail outside its allowlisted fixture path"
          exit 1
        fi
        if [ "$canary_status" -ne 1 ]; then
          echo "::error title=Secret scanner canary failed unexpectedly::Scanner exited with status $canary_status"
          exit "$canary_status"
        fi

    - name: Scan committed changes for secrets
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
      run: |
        zero_sha="0000000000000000000000000000000000000000"
        if [ "$EVENT_NAME" = "pull_request" ]; then
          scan_range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
        elif [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "$zero_sha" ]; then
          scan_range="${PUSH_BEFORE_SHA}..${GITHUB_SHA}"
        else
          scan_range="${GITHUB_SHA}^..${GITHUB_SHA}"
        fi
        gitleaks git \
          --config .gitleaks.toml \
          --redact \
          --no-banner \
          --verbose \
          --log-opts "$scan_range" \
          .

  build:
    needs: [repo-policy, lint, test, security, secret-scan, spacy-integration]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Build package
      run: |
        uv run --with build python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-packages
        path: dist/
