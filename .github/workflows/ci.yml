name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  repo-policy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Enforce repo file policy
      run: |
        python scripts/release/check_repo_policy.py

    - name: Enforce dependency license policy
      run: |
        python scripts/release/check_license_policy.py

    - name: Validate GitHub Actions references
      run: |
        python scripts/release/check_github_actions_refs.py

  lockfile-drift:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Check uv.lock matches pyproject.toml
      run: |
        if ! uv lock --check; then
          echo "::error title=uv.lock is out of date::Run 'uv lock' and commit the updated uv.lock."
          exit 1
        fi

  lint:
    needs: repo-policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install lint dependencies
      run: |
        uv sync --frozen --extra dev --python 3.11

    - name: Lint with Ruff
      run: |
        uv run ruff check --output-format=github .

    - name: Check Ruff formatting
      run: |
        uv run ruff format --check .

    - name: Type-check annotated public modules
      run: |
        uv run mypy

  test:
    needs: [repo-policy, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # Exclude some combinations to reduce CI time
          - os: windows-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.10"

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install dependencies
      run: |
        uv sync --frozen --extra dev --python ${{ matrix.python-version }}

    - name: Validate model manifest schema
      run: |
        uv run python -m scripts.manifest.validate_manifest

    - name: Trust-CI no-raw-PHI logging guard
      run: |
        uv run pytest tests/unit/test_no_raw_text_logging.py -q

    - name: Test with pytest
      run: |
        uv run pytest --cov=openmed --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    needs: repo-policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install dependencies
      run: |
        uv sync --frozen --extra dev --python 3.11

    - name: Run Bandit report
      run: |
        uv run --with 'bandit[toml]' bandit -r openmed -f json -o bandit-report.json --exit-zero

    - name: Enforce high-severity Bandit findings
      run: |
        uv run --with 'bandit[toml]' bandit -r openmed --severity-level high --confidence-level medium

    - name: Run pip-audit dependency gate
      run: |
        uv run \
          --with pip-audit \
          --with 'requests>=2.33.0' \
          --with 'urllib3>=2.7.0' \
          python scripts/security/pip_audit_gate.py

    - name: Upload security reports
      uses: actions/upload-artifact@v7
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json
      if: always()

  sbom:
    needs: repo-policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Sync runtime environment
      run: |
        uv sync --frozen --python 3.11

    - name: Generate CycloneDX SBOM
      run: |
        uv run --no-project --with 'cyclonedx-bom>=4.6,<7' python scripts/security/generate_sbom.py

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v7
      with:
        name: sbom
        path: sbom.cdx.json
      if: always()

  spacy-integration:
    needs: [repo-policy, lint]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Cache pip packages
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-spacy-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-spacy-
          ${{ runner.os }}-pip-

    - name: Install spaCy test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,spacy]"

    - name: Run spaCy adapter tests
      run: |
        pytest tests/unit/interop/test_spacy_component.py -q

  browser-extension:
    needs: repo-policy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: npm
        cache-dependency-path: web/extension/package-lock.json

    - name: Install extension dependencies
      working-directory: web/extension
      run: npm ci

    - name: Install headless Chromium
      working-directory: web/extension
      run: npx playwright install --with-deps chromium

    - name: Test browser extension
      working-directory: web/extension
      run: npm test

  build:
    needs: [repo-policy, lint, test, security, spacy-integration, browser-extension]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Build package
      run: |
        uv run --with build python -m build

    - name: Verify PEP 561 marker in built artifacts
      run: |
        python - <<'PY'
        from pathlib import Path
        import tarfile
        import zipfile

        wheel = next(Path("dist").glob("*.whl"))
        sdist = next(Path("dist").glob("*.tar.gz"))
        with zipfile.ZipFile(wheel) as archive:
            assert "openmed/py.typed" in archive.namelist()
        with tarfile.open(sdist, "r:gz") as archive:
            assert any(name.endswith("/openmed/py.typed") for name in archive.getnames())
        PY

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-packages
        path: dist/
