# Tags matching v* build and publish the openmed package to PyPI.
name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Clean package cache
        run: |
          pip uninstall openmed -y || true
          rm -rf ~/.cache/pip || true

      - name: Clean build artifacts
        run: |
          rm -rf dist build

      - name: Enforce repo file policy
        run: |
          python scripts/release/check_repo_policy.py

      - name: Compute release metadata
        id: release_metadata
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            RELEASE_COMMIT=$(git rev-list -n 1 "$GITHUB_REF_NAME")
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${RELEASE_COMMIT}^" 2>/dev/null || true)
            RANGE_END="$RELEASE_COMMIT"
          else
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)
            RANGE_END="HEAD"
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            BASE_VERSION="${PREVIOUS_TAG#v}"
            RANGE="${PREVIOUS_TAG}..${RANGE_END}"
          else
            BASE_VERSION="0.0.0"
            RANGE="$RANGE_END"
          fi

          python scripts/release/changelog.py \
            --range "$RANGE" \
            --current-version "$BASE_VERSION" \
            --github-output

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: |
          VERSION=$(python -c "import pathlib, re; content = pathlib.Path('openmed/__about__.py').read_text(); print(re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', content).group(1))")
          TAG=${GITHUB_REF#refs/tags/v}
          COMPUTED_VERSION="${{ steps.release_metadata.outputs.next_version }}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: package version $VERSION != tag version $TAG"
            exit 1
          fi
          if [ "$COMPUTED_VERSION" != "$TAG" ]; then
            echo "Version mismatch: computed next version $COMPUTED_VERSION != tag version $TAG"
            exit 1
          fi

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openmed
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          attestations: true

  sbom:
    name: Generate release SBOM
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # attach the SBOM asset to the tagged GitHub release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # SBOM generation runs after publish and is fail-open: a hiccup in any of
      # these steps must never block an otherwise-successful release.
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        continue-on-error: true
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Generate CycloneDX SBOM
        continue-on-error: true
        run: |
          uv sync --frozen --python 3.11
          uv run --no-project --with 'cyclonedx-bom>=4.6,<7' python scripts/security/generate_sbom.py

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: warn

      - name: Attach SBOM to the tagged GitHub release
        if: github.ref_type == 'tag' && hashFiles('sbom.cdx.json') != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" sbom.cdx.json --clobber \
            || gh release create "$GITHUB_REF_NAME" sbom.cdx.json \
                 --title "$GITHUB_REF_NAME" --generate-notes
