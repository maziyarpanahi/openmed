# Tags matching v* publish the openmed package to PyPI.
# workflow_dispatch runs the same guarded publish job manually.
name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openmed

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatch

      - name: Clean package cache
        run: |
          pip uninstall openmed -y || true
          rm -rf ~/.cache/pip || true

      - name: Clean build artifacts
        run: |
          rm -rf dist build

      - name: Enforce repo file policy
        run: |
          python scripts/release/check_repo_policy.py

      - name: Compute release metadata
        id: release_metadata
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            RELEASE_COMMIT=$(git rev-list -n 1 "$GITHUB_REF_NAME")
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${RELEASE_COMMIT}^" 2>/dev/null || true)
            RANGE_END="$RELEASE_COMMIT"
          else
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)
            RANGE_END="HEAD"
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            BASE_VERSION="${PREVIOUS_TAG#v}"
            RANGE="${PREVIOUS_TAG}..${RANGE_END}"
          else
            BASE_VERSION="0.0.0"
            RANGE="$RANGE_END"
          fi

          python scripts/release/changelog.py \
            --range "$RANGE" \
            --current-version "$BASE_VERSION" \
            --github-output

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: |
          VERSION=$(python -c "import pathlib, re; content = pathlib.Path('openmed/__about__.py').read_text(); print(re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', content).group(1))")
          TAG=${GITHUB_REF#refs/tags/v}
          COMPUTED_VERSION="${{ steps.release_metadata.outputs.next_version }}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: package version $VERSION != tag version $TAG"
            exit 1
          fi
          if [ "$COMPUTED_VERSION" != "$TAG" ]; then
            echo "Version mismatch: computed next version $COMPUTED_VERSION != tag version $TAG"
            exit 1
          fi

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        env:
          HATCH_INDEX_USER: __token__
          HATCH_INDEX_AUTH: ${{ secrets.PYPI_API_TOKEN }}
          HATCH_KEYRING: disabled
        run: |
          hatch publish
