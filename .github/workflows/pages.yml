name: Deploy Docs to GitHub Pages

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]
    paths:
      - ".github/workflows/pages.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "openmed/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'deploy' }}"
  # Pages deployments should finish once started; cancelling them can leave
  # the final deploy-pages handoff in a failed state during merge bursts.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install documentation tooling
        run: python -m pip install ".[docs]"
      - name: Render public benchmark leaderboard
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$GITHUB_REF_NAME"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            version="$(python -c 'from openmed.__about__ import __version__; print(__version__)')"
            release_tag="v${version}"
          fi
          python -m openmed.eval.leaderboard \
            --reports-dir docs/benchmarks \
            --output-dir docs/eval/benchmark-leaderboard \
            --manifest models.jsonl \
            --release-tag "$release_tag"
      - name: Build MkDocs site and verify LLM feeds
        run: |
          mkdocs build --strict
          test -s site/docs/llms.txt
          test -s site/docs/llms-full.txt
      - name: Verify localized documentation trees
        run: |
          test -f site/docs/index.html
          test -f site/docs/zh/index.html
          test -f site/docs/zh/getting-started/index.html
          test -f site/docs/zh/mlx-backend/index.html
          test -f site/docs/hi/index.html
          test -f site/docs/hi/getting-started/index.html
          test -f site/docs/hi/mlx-backend/index.html
      - name: Bundle marketing site
        run: rsync -av docs/website/ site/
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
