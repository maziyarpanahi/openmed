name: Deploy Docs to GitHub Pages

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Pages deployments should finish once started; cancelling them can leave
  # the final deploy-pages handoff in a failed state during merge bursts.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install documentation tooling
        run: pip install ".[docs]"
      - name: Render public benchmark leaderboard
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$GITHUB_REF_NAME"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            version="$(python -c 'from openmed.__about__ import __version__; print(__version__)')"
            release_tag="v${version}"
          fi
          python -m openmed.eval.leaderboard \
            --reports-dir docs/benchmarks \
            --output-dir docs/eval/benchmark-leaderboard \
            --manifest models.jsonl \
            --release-tag "$release_tag"
      - name: Build MkDocs site and verify LLM feeds
        run: |
          mkdocs build --strict
          test -s site/docs/llms.txt
          test -s site/docs/llms-full.txt
      - name: Bundle marketing site
        run: rsync -av docs/website/ site/
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
