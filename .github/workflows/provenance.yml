name: Release Provenance

on:
  workflow_call:
    inputs:
      distribution-artifact-name:
        description: Name to use for the wheel and sdist workflow artifact.
        required: false
        type: string
        default: python-package-distributions

permissions:
  contents: read

jobs:
  python-distributions:
    name: Build, attest, and verify Python distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Clean package cache
        run: |
          pip uninstall openmed -y || true
          rm -rf ~/.cache/pip || true

      - name: Clean build artifacts
        run: |
          rm -rf dist build

      - name: Enforce repo file policy
        run: |
          python scripts/release/check_repo_policy.py

      - name: Compute release metadata
        id: release_metadata
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            RELEASE_COMMIT=$(git rev-list -n 1 "$GITHUB_REF_NAME")
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${RELEASE_COMMIT}^" 2>/dev/null || true)
            RANGE_END="$RELEASE_COMMIT"
          else
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)
            RANGE_END="HEAD"
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            BASE_VERSION="${PREVIOUS_TAG#v}"
            RANGE="${PREVIOUS_TAG}..${RANGE_END}"
          else
            BASE_VERSION="0.0.0"
            RANGE="$RANGE_END"
          fi

          python scripts/release/changelog.py \
            --range "$RANGE" \
            --current-version "$BASE_VERSION" \
            --github-output

      - name: Verify version matches tag
        if: github.ref_type == 'tag'
        run: |
          VERSION=$(python -c "import pathlib, re; content = pathlib.Path('openmed/__about__.py').read_text(); print(re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', content).group(1))")
          TAG=${GITHUB_REF#refs/tags/v}
          COMPUTED_VERSION="${{ steps.release_metadata.outputs.next_version }}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: package version $VERSION != tag version $TAG"
            exit 1
          fi
          if [ "$COMPUTED_VERSION" != "$TAG" ]; then
            echo "Version mismatch: computed next version $COMPUTED_VERSION != tag version $TAG"
            exit 1
          fi

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          twine check dist/*

      - name: Build release artifact digest manifest
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(dist/*)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found in dist/."
            exit 1
          fi

          wheel_count=0
          sdist_count=0
          : > release-artifact-digests.txt
          for artifact in "${artifacts[@]}"; do
            name="$(basename "$artifact")"
            case "$name" in
              *.whl) wheel_count=$((wheel_count + 1)) ;;
              *.tar.gz) sdist_count=$((sdist_count + 1)) ;;
              *)
                echo "Unexpected release artifact: $name"
                exit 1
                ;;
            esac
            digest="$(sha256sum "$artifact" | awk '{print $1}')"
            printf '%s  %s\n' "$digest" "$name" >> release-artifact-digests.txt
          done

          if [ "$wheel_count" -eq 0 ] || [ "$sdist_count" -eq 0 ]; then
            echo "Expected at least one wheel and one source distribution."
            exit 1
          fi
          sort -k 2 -o release-artifact-digests.txt release-artifact-digests.txt
          cat release-artifact-digests.txt

      - name: Generate SLSA provenance for distributions
        id: attest-distributions
        continue-on-error: true
        uses: actions/attest@v4
        with:
          subject-checksums: release-artifact-digests.txt

      - name: Preserve distribution attestation bundle
        if: steps.attest-distributions.outcome == 'success'
        shell: bash
        run: |
          mkdir -p provenance-bundles
          test -s "${{ steps.attest-distributions.outputs.bundle-path }}"
          cp "${{ steps.attest-distributions.outputs.bundle-path }}" \
            provenance-bundles/python-distributions.intoto.json

      - name: Verify distribution provenance
        if: steps.attest-distributions.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p provenance-verification
          shopt -s nullglob
          artifacts=(dist/*)
          for artifact in "${artifacts[@]}"; do
            name="$(basename "$artifact")"
            output="provenance-verification/${name}.json"
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --predicate-type https://slsa.dev/provenance/v1 \
              --signer-workflow "github.com/${GITHUB_REPOSITORY}/.github/workflows/provenance.yml" \
              --source-digest "$GITHUB_SHA" \
              --source-ref "$GITHUB_REF" \
              --format json > "$output"
            python3 - "$output" <<'PY'
          import json
          import os
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          blob = json.dumps(payload, sort_keys=True)
          required = [
              "https://slsa.dev/provenance/v1",
              os.environ["GITHUB_SHA"],
              ".github/workflows/provenance.yml",
          ]
          missing = [value for value in required if value not in blob]
          if missing:
              raise SystemExit(f"provenance verification output missing: {missing}")
          PY
          done

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.distribution-artifact-name }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Upload provenance evidence
        if: steps.attest-distributions.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: release-provenance
          path: |
            release-artifact-digests.txt
            provenance-bundles/*.json
            provenance-verification/*.json
          if-no-files-found: error
          retention-days: 90
