[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openmed"
dynamic = ["version"]
description = "OpenMed delivers state-of-the-art biomedical and clinical LLMs that rival proprietary enterprise stacks, unifying model discovery, advanced extractions, and one-line orchestration."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
keywords = [
  "biomedical",
  "clinical",
  "NLP",
  "LLM",
  "healthcare",
  "medical",
  "natural language processing",
  "medical language models",
  "medical LLMs",
  "medical NLP",
  "medical NER",
  "medical de-identification",
  "medical extraction",
  "medical reasoning",
]
dependencies = [
  "pysbd>=0.3.4,<0.4",
]

authors = [
  { name = "Maziyar Panahi" }
]

[project.optional-dependencies]
dev = [
  "flake8>=7.0",
  "pytest>=7.0",
  "pytest-cov>=4.0",
  "fastapi>=0.110",
  "httpx>=0.27",
]

hf = [
  # Transformers 5.x needs PyTorch >=2.4; macOS Intel PyPI wheels stop around torch 2.2.x — cap TF to 4.x only there.
  'transformers>=4.50,<5; sys_platform == "darwin" and platform_machine == "x86_64"',
  'transformers>=4.50; sys_platform != "darwin" or platform_machine != "x86_64"',
  # Those Intel torch wheels target NumPy 1.x ABI; NumPy 2 makes torch report "Numpy is not available" for .numpy().
  'numpy>=1.26,<2; sys_platform == "darwin" and platform_machine == "x86_64"',
  "huggingface-hub>=0.30",
  "accelerate>=0.29",
  "tokenizers>=0.15",
]

service = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29",
]

gliner = [
  "gliner[tokenizers]>=0.2.0",
  "torch>=2.0",
  'numpy>=1.26,<2; sys_platform == "darwin" and platform_machine == "x86_64"',
]

mlx = [
  # MLX wheels: Apple Silicon macOS and Linux (not macOS Intel or Windows).
  'mlx>=0.22; (sys_platform == "darwin" and platform_machine == "arm64") or sys_platform == "linux"',
  "huggingface-hub>=0.30",
  'transformers>=4.50,<5; sys_platform == "darwin" and platform_machine == "x86_64"',
  'transformers>=4.50; sys_platform != "darwin" or platform_machine != "x86_64"',
  'numpy>=1.26,<2; sys_platform == "darwin" and platform_machine == "x86_64"',
  "tokenizers>=0.15",
  "safetensors>=0.4",
]

coreml = [
  "coremltools>=8.0",
  "torch>=2.0",
  "transformers>=4.50",
  'numpy>=1.26,<2; sys_platform == "darwin" and platform_machine == "x86_64"',
]

docs = [
  "mkdocs>=1.6",
  "mkdocs-material>=9.5",
  "mkdocs-git-revision-date-localized-plugin>=1.2.6",
  "mkdocs-minify-plugin>=0.8.0",
  "pymdown-extensions>=10.8",
]

[tool.hatch.build]
include = [
  "openmed/**",
  "README.md",
  "pyproject.toml"
]

[tool.hatch.version]
path = "openmed/__about__.py"

[tool.hatch.publish.index]
disable = false

[tool.hatch.publish.index.repos]
pypi = { url = "https://upload.pypi.org/legacy/" }

[tool.pytest.ini_options]
markers = [
  "integration: marks end-to-end or external integration tests",
  "slow: marks tests that are expected to run slowly"
]
python_files = [
  "test_*.py",
  "*_test.py",
]
testpaths = [
  "tests",
]
