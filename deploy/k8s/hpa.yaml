apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openmed-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openmed-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Pods
      pods:
        metric:
          name: openmed_service_scaling_queue_depth
        target:
          type: AverageValue
          averageValue: "8"
    - type: Pods
      pods:
        metric:
          name: openmed_service_scaling_inflight_requests
        target:
          type: AverageValue
          averageValue: "4"
