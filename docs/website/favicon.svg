<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
    <style>
        .bg { fill: #0E1116; }
        .cross { fill: #F7F4EC; }
        .dot { fill: #0D6E6E; }
        @media (prefers-color-scheme: dark) {
            .bg { fill: #E9E4D7; }
            .cross { fill: #0E1116; }
            .dot { fill: #2BA5A5; }
        }
    </style>
    <rect x="2" y="2" width="36" height="36" rx="8" class="bg" />
    <rect x="11" y="17.5" width="18" height="5" rx="1" class="cross" />
    <rect x="17.5" y="11" width="5" height="18" rx="1" class="cross" />
    <circle cx="20" cy="20" r="2" class="dot" />
</svg>
